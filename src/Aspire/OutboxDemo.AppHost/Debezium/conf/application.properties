# --- Debezium Server: NATS JetStream sink + PostgreSQL source + Outbox EventRouter ---
#
# The env vars (POSTGRES_*, NATS_*) are injected into the container by the Aspire AppHost.
# NATS_URI is generated by the Aspire NATS hosting integration
# (format: nats://user:pass@host:port).

# Sink: NATS JetStream
# Debezium creates the stream named `DebeziumStream` for the subject pattern below.
debezium.sink.type=nats-jetstream
debezium.sink.nats-jetstream.url=${NATS_URI}
debezium.sink.nats-jetstream.create-stream=true
debezium.sink.nats-jetstream.subjects=events.>

# Source: PostgreSQL (logical replication with pgoutput)
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.database.hostname=${POSTGRES_HOST}
debezium.source.database.port=${POSTGRES_PORT}
debezium.source.database.user=${POSTGRES_USER}
debezium.source.database.password=${POSTGRES_PASSWORD}
debezium.source.database.dbname=${POSTGRES_DBNAME}
debezium.source.topic.prefix=orderdb
debezium.source.schema.include.list=public
debezium.source.table.include.list=public.outbox_messages
debezium.source.plugin.name=pgoutput
debezium.source.publication.name=dbz_outbox_publication
debezium.source.publication.autocreate.mode=disabled
debezium.source.slot.name=dbz_outbox_slot
debezium.source.tombstones.on.delete=false
# Heartbeat disabled: the heartbeat message would go to the `__debezium-heartbeat.<prefix>` subject,
# which does not match the stream's `events.>` filter and produces a 503 No Responders error.
debezium.source.heartbeat.interval.ms=0
debezium.source.snapshot.mode=initial

# Offset storage (file based)
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=5000

# Schema history (required by the connector framework but not used in PG)
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/schema-history.dat

# Outbox EventRouter transform
debezium.transforms=outbox
debezium.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter
debezium.transforms.outbox.table.field.event.id=id
debezium.transforms.outbox.table.field.event.key=aggregate_id
debezium.transforms.outbox.table.field.event.payload=payload
debezium.transforms.outbox.route.by.field=aggregate_type
# The `${routedByValue}` template placeholder is not always substituted correctly in the
# Debezium Server context when passing through Quarkus/SmallRye Config, so we configure
# a static topic name here. For multiple aggregate types this can be extended with ContentBasedRouter.
debezium.transforms.outbox.route.topic.replacement=events.order
debezium.transforms.outbox.table.fields.additional.placement=type:header:eventType
debezium.transforms.outbox.table.expand.json.payload=true

# Output formats: plain JSON without schemas
debezium.format.key=json
debezium.format.value=json
debezium.format.header=json
debezium.format.key.schemas.enable=false
debezium.format.value.schemas.enable=false

# Quarkus logging
quarkus.log.level=INFO
quarkus.log.console.json=false
quarkus.log.category."io.debezium".level=INFO
quarkus.log.category."io.debezium.server.nats.jetstream".level=DEBUG
